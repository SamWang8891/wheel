<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5e1"/>
      <stop offset="50%" stop-color="#b8975a"/>
      <stop offset="100%" stop-color="#fff5e1"/>
    </linearGradient>
    <radialGradient id="yes" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#ffe2ec"/>
      <stop offset="55%" stop-color="#ff5d8f"/>
      <stop offset="100%" stop-color="#a83960"/>
    </radialGradient>
    <radialGradient id="no" cx="0.7" cy="0.7" r="0.9">
      <stop offset="0%" stop-color="#fff1c2"/>
      <stop offset="55%" stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#a87618"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5e1"/>
      <stop offset="40%" stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#a87618"/>
    </linearGradient>
  </defs>

  <!-- left half (YES) -->
  <path d="M32 4 A28 28 0 0 0 32 60 Z" fill="url(#yes)"/>
  <!-- right half (NO) -->
  <path d="M32 4 A28 28 0 0 1 32 60 Z" fill="url(#no)"/>

  <!-- divider -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="rgba(255,245,225,0.7)" stroke-width="0.8"/>

  <!-- gold rim -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#rim)" stroke-width="2.4"/>

  <!-- inner halo -->
  <circle cx="32" cy="32" r="10" fill="rgba(0,0,0,0.35)"/>
  <circle cx="32" cy="32" r="6" fill="#1a0e2e"/>

  <!-- needle (top) -->
  <path d="M32 0 C 40 0 44 7 44 14 C 44 22 32 30 32 30 C 32 30 20 22 20 14 C 20 7 24 0 32 0 Z"
        fill="url(#needle)" stroke="#5d4116" stroke-width="0.8"/>
  <circle cx="32" cy="13" r="3" fill="#3a2810"/>
  <circle cx="31" cy="12" r="1" fill="#fff8e8"/>
</svg>
